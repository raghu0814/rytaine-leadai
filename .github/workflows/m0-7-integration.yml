name: m0-7-integration

# Acceptance gate for M0-7: prove application-layer tenant enforcement end-to-end.
# Stands up a REAL Supabase local stack (real anon/authenticated/service_role roles,
# storage, pgvector; migrations 0001-0016 applied + seed loaded), then runs the
# DB-backed API integration suite, which drives the live FastAPI app + asyncpg + RLS
# to prove tenant A cannot reach tenant B through real endpoints, that JWT claim
# injection works, and that the service-role path still functions.
on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "supabase/**"
      - ".github/workflows/m0-7-integration.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "supabase/**"
      - ".github/workflows/m0-7-integration.yml"
  workflow_dispatch: {}

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      # Default local-stack DB connection string (see supabase/config.toml -> [db] port).
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        # Applies migrations 0001-0016 in order and loads supabase/seed.sql. The
        # integration suite is seed-independent (dedicated 7a/7b fixtures).
        run: supabase db start

      - name: Wait for database readiness
        run: |
          for i in $(seq 1 30); do
            if pg_isready -d "$INTEGRATION_DATABASE_URL" >/dev/null 2>&1; then
              echo "database is ready"; exit 0
            fi
            echo "waiting for db... ($i)"; sleep 2
          done
          echo "database did not become ready in time" >&2; exit 1

      - name: Confirm enforcement prerequisites (helpers + RLS/FORCE)
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -t -A -c "
            select case
              when (select count(*) from pg_proc
                    where proname in ('current_company_id','current_user_role')) = 2
               and (select count(*) from pg_class c
                    join pg_namespace n on n.oid = c.relnamespace
                    where n.nspname='public' and c.relkind='r'
                      and c.relrowsecurity and c.relforcerowsecurity) = 16
              then 'PREREQS OK'
              else 'PREREQS MISSING' end;" | grep -q 'PREREQS OK'

      - name: Install API service (dev extras)
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run M0-7 integration suite
        run: |
          cd services/api
          pytest tests/integration -v

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop || true