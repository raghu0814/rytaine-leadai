name: m1-0-lead-events

# Acceptance gate for M1.0: prove the lead_events append-only delivery ledger
# (migration 0018) against a REAL Supabase local stack (real anon/authenticated/
# service_role roles, storage schema, pgvector; migrations 0001-0018 applied +
# seed loaded), so the enforcement path matches production. Runs three layers:
#   1. pgTAP structural + behavioural suite (pg_prove, pass/fail exit code),
#   2. verify_m1_0.sql hard-asserts (grant matrix, append-only, RLS+FORCE, FK
#      RESTRICT, idempotency UNIQUE, CHECKs, indexes, M0 RLS set preserved),
#   3. DB-backed integration suite (real asyncpg/SQLAlchemy driver + JWT-claim
#      injection: service_role write path, admin-only isolation, idempotency).
# Hermetic: no cloud secrets; everything runs against the local stack.
on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "services/api/**"
      - "tests/m1_0_lead_events.test.sql"
      - "verification/verify_m1_0.sql"
      - ".github/workflows/m1-0-lead-events.yml"
  pull_request:
    paths:
      - "supabase/**"
      - "services/api/**"
      - "tests/m1_0_lead_events.test.sql"
      - "verification/verify_m1_0.sql"
      - ".github/workflows/m1-0-lead-events.yml"
  workflow_dispatch: {}

jobs:
  lead-events:
    runs-on: ubuntu-latest
    env:
      # Default local-stack connection string printed by `supabase start`. Used by
      # psql/pg_prove AND read by the Python integration suite (which normalises it
      # to the asyncpg driver). No hosted-project credentials are referenced.
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client + pg_prove
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-client \
            libtap-parser-sourcehandler-pgtap-perl
          pg_prove --version

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        # Applies migrations 0001-0018 in order (lead_events is 0018) and loads
        # supabase/seed.sql. The M1.0 suites are seed-independent (dedicated
        # aaaa…/bbbb… pgTAP fixtures and 7d…/7e…/7f… integration fixtures).
        run: supabase db start

      - name: Wait for database readiness
        run: |
          for i in $(seq 1 30); do
            if pg_isready -d "$INTEGRATION_DATABASE_URL" >/dev/null 2>&1; then
              echo "database is ready"; exit 0
            fi
            echo "waiting for db... ($i)"; sleep 2
          done
          echo "database did not become ready in time" >&2; exit 1

      - name: Confirm prerequisites (helpers + lead_events RLS/FORCE + M0 set)
        # Fast, explicit fail before the suites if 0018 (or any M0 RLS table) is not
        # in the expected state. Asserts the NAMED M0 set is still forced (not a
        # brittle total count), so this gate stays correct as later milestones add
        # further RLS tables.
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -t -A -c "
            select case
              when (select count(*) from pg_proc
                    where proname in ('current_company_id','current_user_role')) = 2
               and (select relrowsecurity and relforcerowsecurity
                    from pg_class where oid='public.lead_events'::regclass)
               and (select count(*) from (values
                      ('companies'),('users'),('prompts'),('knowledge_bases'),
                      ('agent_configs'),('leads'),('lead_notes'),('call_schedules'),
                      ('calls'),('transcripts'),('recordings'),('messages'),
                      ('documents'),('document_chunks'),('usage_logs'),('audit_logs')
                    ) as m0(t)
                    join pg_class c on c.relname = m0.t and c.relkind='r'
                    join pg_namespace n on n.oid = c.relnamespace and n.nspname='public'
                    where c.relrowsecurity and c.relforcerowsecurity) = 16
              then 'PREREQS OK'
              else 'PREREQS MISSING' end;" | grep -q 'PREREQS OK'

      - name: Run M1.0 pgTAP suite
        run: |
          pg_prove --verbose "$INTEGRATION_DATABASE_URL" tests/m1_0_lead_events.test.sql

      - name: Run M1.0 verification hard-asserts
        # verify_m1_0.sql RAISES on any contract breach; ON_ERROR_STOP makes that a
        # non-zero exit. Belt-and-suspenders grep on the success NOTICE.
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f verification/verify_m1_0.sql 2>&1 | tee /tmp/verify_m1_0.out
          grep -q 'M1.0 VERIFICATION PASSED' /tmp/verify_m1_0.out

      - name: Install API service (dev extras)
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run M1.0 integration suite
        run: |
          cd services/api
          pytest tests/integration/test_m1_0_lead_events.py -v

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop || true
