name: m0-9-privilege-floor

# Regression gate for migration 0019 (full-schema privilege-floor remediation).
# Runs against a REAL Supabase local stack via `supabase db start`, which applies
# the platform default privileges (ALTER DEFAULT PRIVILEGES ... GRANT ALL ON
# TABLES TO anon, authenticated, service_role) — the exact condition that made
# the over-grant defect invisible to a bare-Postgres rig. This gate fails if any
# application table ever again exposes TRUNCATE (or any privilege beyond the
# intended 0017 surface) to anon / authenticated / service_role.
#   1. verify_0019_privilege_floor.sql — exact grant-surface hard-asserts,
#   2. test_0019_privilege_floor.py     — behavioural TRUNCATE/UPDATE/DELETE denial
#      through the real asyncpg/SQLAlchemy driver.
# Hermetic: no cloud secrets.
on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "verification/verify_0019_privilege_floor.sql"
      - "services/api/tests/integration/test_0019_privilege_floor.py"
      - ".github/workflows/m0-9-privilege-floor.yml"
  pull_request:
    paths:
      - "supabase/**"
      - "verification/verify_0019_privilege_floor.sql"
      - "services/api/tests/integration/test_0019_privilege_floor.py"
      - ".github/workflows/m0-9-privilege-floor.yml"
  workflow_dispatch: {}

jobs:
  privilege-floor:
    runs-on: ubuntu-latest
    env:
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        # Applies migrations 0001-0019 + seed; the managed Postgres image carries
        # the platform default privileges, so this is a faithful privilege model.
        run: supabase db start

      - name: Wait for database readiness
        run: |
          for i in $(seq 1 30); do
            if pg_isready -d "$INTEGRATION_DATABASE_URL" >/dev/null 2>&1; then
              echo "database is ready"; exit 0
            fi
            echo "waiting for db... ($i)"; sleep 2
          done
          echo "database did not become ready in time" >&2; exit 1

      - name: Confirm 0019 applied (fast fail)
        # Sample assertion: no role may hold TRUNCATE on the append-only tables.
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 -t -A -c "
            select case when (
              select bool_or(has_table_privilege(r, t, 'TRUNCATE'))
              from unnest(array['anon','authenticated','service_role']) r,
                   unnest(array['public.usage_logs','public.audit_logs','public.lead_events']) t
            ) then 'FLOOR BROKEN' else 'FLOOR OK' end;" | grep -q 'FLOOR OK'

      - name: Run privilege-floor verification hard-asserts
        run: |
          psql "$INTEGRATION_DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f verification/verify_0019_privilege_floor.sql 2>&1 | tee /tmp/verify_0019.out
          grep -q '0019 PRIVILEGE-FLOOR VERIFICATION PASSED' /tmp/verify_0019.out

      - name: Install API service (dev extras)
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run privilege-floor integration suite
        run: |
          cd services/api
          pytest tests/integration/test_0019_privilege_floor.py -v

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop || true
